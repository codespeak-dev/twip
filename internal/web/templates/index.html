<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>twip</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <span class="logo">twip</span>
    <span class="subtitle">repository timeline</span>
  </header>
  <main class="app">
    <section class="timeline" aria-label="timeline">
      <div id="timeline" class="list"></div>
    </section>
    <section class="detail" aria-label="event detail">
      <div id="detail" class="detail-inner">
        <p class="placeholder">Select an event on the left.</p>
      </div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
